AWSTemplateFormatVersion: '2010-09-09'
Description: 'BTG Pactual - Plataforma de Gestión de Fondos - Producción'

Parameters:
  Environment:
    Type: String
    Default: prod
    AllowedValues:
      - dev
      - prod
    Description: Ambiente de despliegue
  
  VpcId:
    Type: AWS::EC2::VPC::Id
    Description: ID de la VPC existente
  
  SubnetIds:
    Type: List<AWS::EC2::Subnet::Id>
    Description: IDs de las subnets (mínimo 2)
    MinLength: 2
    MaxLength: 2

Mappings:
  EnvironmentConfig:
    dev:
      InstanceClass: db.t3.medium
      DesiredCount: 2
      MinCapacity: 1
      MaxCapacity: 3
      LogRetention: 7
    prod:
      InstanceClass: db.t3.large
      DesiredCount: 4
      MinCapacity: 2
      MaxCapacity: 8
      LogRetention: 30

Resources:
  # ============================================
  # SECURITY GROUPS
  # ============================================
  MongoDBSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group para MongoDB
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 27017
          ToPort: 27017
          CidrIp: 10.0.0.0/16
          Description: Acceso MongoDB desde la VPC
      Tags:
        - Key: Name
          Value: !Sub ${Environment}-mongodb-sg
        - Key: Environment
          Value: !Ref Environment

  AppSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group para la aplicación
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 8080
          ToPort: 8080
          CidrIp: 0.0.0.0/0
          Description: Acceso HTTP a la API
      Tags:
        - Key: Name
          Value: !Sub ${Environment}-app-sg

  # ============================================
  # DOCUMENTDB (MongoDB)
  # ============================================
  DocumentDBSubnetGroup:
    Type: AWS::DocDB::DBSubnetGroup
    Properties:
      DBSubnetGroupDescription: Subnet group para DocumentDB
      SubnetIds: !Ref SubnetIds
      Tags:
        - Key: Environment
          Value: !Ref Environment

  DocumentDBCluster:
    Type: AWS::DocDB::DBCluster
    Properties:
      MasterUsername: admin
      MasterUserPassword: !Sub "{{resolve:ssm:/${Environment}/docdb/password:1}}"
      DBSubnetGroupName: !Ref DocumentDBSubnetGroup
      VpcSecurityGroupIds:
        - !Ref MongoDBSecurityGroup
      StorageEncrypted: true
      BackupRetentionPeriod: !FindInMap [EnvironmentConfig, !Ref Environment, LogRetention]
      PreferredBackupWindow: '03:00-04:00'
      Tags:
        - Key: Environment
          Value: !Ref Environment

  DocumentDBInstance:
    Type: AWS::DocDB::DBInstance
    Properties:
      DBClusterIdentifier: !Ref DocumentDBCluster
      DBInstanceClass: !FindInMap [EnvironmentConfig, !Ref Environment, InstanceClass]
      AutoMinorVersionUpgrade: true

  # ============================================
  # ECS CLUSTER
  # ============================================
  ECSCluster:
    Type: AWS::ECS::Cluster
    Properties:
      ClusterName: !Sub ${Environment}-fondos-cluster
      ClusterSettings:
        - Name: containerInsights
          Value: enabled

  # ============================================
  # CLOUDWATCH LOGS
  # ============================================
  CloudWatchLogsGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /ecs/${Environment}-fondos
      RetentionInDays: !FindInMap [EnvironmentConfig, !Ref Environment, LogRetention]

  # ============================================
  # IAM ROLES
  # ============================================
  ECSExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonECSTaskExecutionRolePolicy
      Policies:
        - PolicyName: GetSSMParameters
          PolicyDocument:
            Statement:
              - Effect: Allow
                Action:
                  - ssm:GetParameters
                  - ssm:GetParameter
                Resource: !Sub arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/${Environment}/*

  ECSTaskRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole

  # ============================================
  # TASK DEFINITION
  # ============================================
  TaskDefinition:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: !Sub ${Environment}-fondos-task
      Cpu: 512
      Memory: 1024
      NetworkMode: awsvpc
      RequiresCompatibilities:
        - FARGATE
      ExecutionRoleArn: !GetAtt ECSExecutionRole.Arn
      TaskRoleArn: !GetAtt ECSTaskRole.Arn
      ContainerDefinitions:
        - Name: fondos-app
          Image: !Sub ${AWS::AccountId}.dkr.ecr.${AWS::Region}.amazonaws.com/btg-fondos:${Environment}
          Essential: true
          PortMappings:
            - ContainerPort: 8080
          Environment:
            - Name: SPRING_PROFILES_ACTIVE
              Value: !Ref Environment
            - Name: MONGODB_HOST
              Value: !GetAtt DocumentDBCluster.Endpoint
            - Name: MONGODB_PASSWORD
              Value: !Sub "{{resolve:ssm:/${Environment}/docdb/password:1}}"
            - Name: EMAIL_USERNAME
              Value: !Sub "{{resolve:ssm:/${Environment}/email/username:1}}"
            - Name: EMAIL_PASSWORD
              Value: !Sub "{{resolve:ssm:/${Environment}/email/password:1}}"
            - Name: TWILIO_ACCOUNT_SID
              Value: !Sub "{{resolve:ssm:/${Environment}/twilio/account-sid:1}}"
            - Name: TWILIO_AUTH_TOKEN
              Value: !Sub "{{resolve:ssm:/${Environment}/twilio/auth-token:1}}"
            - Name: TWILIO_PHONE_NUMBER
              Value: !Sub "{{resolve:ssm:/${Environment}/twilio/phone-number:1}}"
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: !Ref CloudWatchLogsGroup
              awslogs-region: !Ref AWS::Region
              awslogs-stream-prefix: ecs
          HealthCheck:
            Command:
              - CMD-SHELL
              - curl -f http://localhost:8080/actuator/health || exit 1
            Interval: 30
            Timeout: 5
            Retries: 3
            StartPeriod: 60

  # ============================================
  # ECS SERVICE
  # ============================================
  ECSService:
    Type: AWS::ECS::Service
    Properties:
      ServiceName: !Sub ${Environment}-fondos-service
      Cluster: !Ref ECSCluster
      TaskDefinition: !Ref TaskDefinition
      DesiredCount: !FindInMap [EnvironmentConfig, !Ref Environment, DesiredCount]
      LaunchType: FARGATE
      NetworkConfiguration:
        AwsvpcConfiguration:
          AssignPublicIp: ENABLED
          SecurityGroups:
            - !Ref AppSecurityGroup
          Subnets: !Ref SubnetIds
      LoadBalancers:
        - TargetGroupArn: !Ref TargetGroup
          ContainerName: fondos-app
          ContainerPort: 8080
      DeploymentConfiguration:
        MaximumPercent: 200
        MinimumHealthyPercent: 100

  # ============================================
  # AUTO SCALING
  # ============================================
  ECSScaleTarget:
    Type: AWS::ApplicationAutoScaling::ScalableTarget
    Properties:
      MaxCapacity: !FindInMap [EnvironmentConfig, !Ref Environment, MaxCapacity]
      MinCapacity: !FindInMap [EnvironmentConfig, !Ref Environment, MinCapacity]
      ResourceId: !Join
        - ''
        - - service/
          - !Ref ECSCluster
          - /
          - !GetAtt ECSService.Name
      RoleARN: !Sub arn:aws:iam::${AWS::AccountId}:role/aws-service-role/ecs.application-autoscaling.amazonaws.com/AWSServiceRoleForApplicationAutoScaling_ECSService
      ScalableDimension: ecs:service:DesiredCount
      ServiceNamespace: ecs

  ScalingPolicy:
    Type: AWS::ApplicationAutoScaling::ScalingPolicy
    Properties:
      PolicyName: cpu-target
      PolicyType: TargetTrackingScaling
      ScalingTargetId: !Ref ECSScaleTarget
      TargetTrackingScalingPolicyConfiguration:
        TargetValue: 70
        PredefinedMetricSpecification:
          PredefinedMetricType: ECSServiceAverageCPUUtilization

  # ============================================
  # LOAD BALANCER
  # ============================================
  LoadBalancer:
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    Properties:
      Name: !Sub ${Environment}-fondos-alb
      Subnets: !Ref SubnetIds
      SecurityGroups:
        - !Ref AppSecurityGroup
      Scheme: internet-facing
      Type: application
      IpAddressType: ipv4

  TargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Name: !Sub ${Environment}-fondos-tg
      Port: 8080
      Protocol: HTTP
      VpcId: !Ref VpcId
      HealthCheckPath: /actuator/health
      HealthCheckIntervalSeconds: 30
      HealthCheckTimeoutSeconds: 5
      HealthyThresholdCount: 2
      UnhealthyThresholdCount: 2
      TargetType: ip

  Listener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref LoadBalancer
      Port: 80
      Protocol: HTTP
      DefaultActions:
        - Type: forward
          TargetGroupArn: !Ref TargetGroup

Outputs:
  LoadBalancerDNS:
    Description: URL de la API
    Value: !GetAtt LoadBalancer.DNSName
    Export:
      Name: !Sub ${AWS::StackName}-API-URL

  MongoDBEndpoint:
    Description: Endpoint de MongoDB
    Value: !GetAtt DocumentDBCluster.Endpoint
    Export:
      Name: !Sub ${AWS::StackName}-MongoDB-Endpoint

  ECSClusterName:
    Description: Nombre del cluster ECS
    Value: !Ref ECSCluster